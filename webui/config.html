<html>
<head><title>Skills Marketplace Settings</title></head>
<body>
    <div x-data>
        <template x-if="$store.settings">
            <div>
                <div class="section-title">Skills Marketplace</div>
                <div class="section-description">
                    Configure the skills.sh marketplace integration.
                </div>

                <label class="toggle-label">
                    <input type="checkbox"
                        x-model="$store.settings.pluginConfig._skills_marketplace.marketplace_enabled"
                        @change="$store.settings.savePluginConfig('_skills_marketplace')">
                    <span>Enable Marketplace</span>
                </label>
                <div class="setting-hint">
                    Allow searching and installing skills from the skills.sh marketplace.
                </div>

                <label class="toggle-label">
                    <input type="checkbox"
                        x-model="$store.settings.pluginConfig._skills_marketplace.auto_check_updates"
                        @change="$store.settings.savePluginConfig('_skills_marketplace')">
                    <span>Auto-check for Updates</span>
                </label>
                <div class="setting-hint">
                    Automatically check for updates to installed marketplace skills.
                </div>
            </div>
        </template>
    </div>

    <style>
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.75rem 0 0.25rem 0;
            font-weight: 600;
            cursor: pointer;
        }

        .setting-hint {
            margin-left: 1.75rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }
    </style>
</body>
</html>
